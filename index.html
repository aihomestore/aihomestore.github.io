<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopee OTP Engine - Premium Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { 
            --bg-color: #f0f9ff;
            --card-bg: #ffffff;
            --accent-primary: #0ea5e9;
            --accent-success: #10b981;
            --accent-purple: #8b5cf6;
            --accent-danger: #ef4444;
            --text-main: #334155;
            --text-muted: #64748b; 
            --border-color: #e2e8f0;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; }
        .main-card { background-color: var(--card-bg); border-radius: 15px; padding: 25px; border: 1px solid var(--border-color); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.05); }
        
        .title-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 0.95rem; font-weight: 800; color: var(--accent-primary); border-left: 4px solid var(--accent-primary); padding-left: 12px; margin-bottom: 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .balance-badge { background-color: #f1f5f9; color: var(--text-main); font-size: 0.75rem; font-weight: 800; padding: 6px 12px; border-radius: 20px; border: 1px solid #cbd5e1; }
        .balance-badge i { color: #059669; margin-right: 4px; }
        
        .form-select, .form-control { background-color: #f8fafc; border: 1px solid #cbd5e1; color: var(--text-main); border-radius: 10px; font-size: 0.8rem; font-weight: 600; padding: 10px 12px; }
        .form-select:focus, .form-control:focus { background-color: #ffffff; color: var(--text-main); border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        
        .btn-order { background-color: var(--accent-primary); color: white; font-weight: 800; width: 100%; padding: 14px; border-radius: 12px; border: none; transition: 0.3s; margin-top: 15px; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.25); font-size: 0.9rem; letter-spacing: 0.5px; }
        .btn-order:hover { background-color: #0284c7; }
        
        .btn-auto { background-color: var(--accent-purple); box-shadow: 0 4px 10px rgba(139, 92, 246, 0.25); margin-top: 8px; }
        .btn-auto:hover { background-color: #7c3aed; }
        
        .otp-display { background-color: #f0fdfa; border: 2px dashed #5eead4; border-radius: 15px; padding: 25px; text-align: center; margin-top: 25px; }
        #otp-box { font-size: 2.8rem; font-weight: 800; color: #0d9488; letter-spacing: 6px; }
        
        .data-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.9rem; align-items: center; border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px; }
        .data-row:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        .text-secondary { color: var(--text-muted) !important; font-weight: 500; }
        
        .btn-util { background-color: #e2e8f0; color: #475569; border: none; padding: 10px 15px; border-radius: 10px; font-size: 0.8rem; font-weight: 700; transition: 0.2s; }
        .btn-success-custom { background-color: var(--accent-success); color: white; }
        
        .data-box { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; margin-bottom: 20px; font-size: 0.85rem; line-height: 1.6; color: var(--text-muted); }
        .data-box b { color: #0f766e; font-weight: 700; }
    </style>
</head>
<body>

    <div class="container" style="max-width: 500px; padding-top: 20px; padding-bottom: 30px;">
        
        <div class="main-card">
            <div class="title-wrapper">
                <div class="section-title">🚀 SHOPEE OTP ENGINE</div>
                <div class="balance-badge"><i class="fa-solid fa-wallet"></i> Rp <span id="display-balance">...</span></div>
            </div>
            
            <div class="row g-2">
                <div class="col-6">
                    <select id="serverSelect" class="form-select" onchange="toggleSmsTarget()">
                        <option value="hero">🚀 HERO SMS</option>
                        <option value="rumah">🏠 RUMAH OTP</option>
                        <option value="smscode">⚡ SMSCODE.GG</option>
                    </select>
                </div>
                <div class="col-6">
                    <select id="operatorSelect" class="form-select">
                        <option value="any">TERMURAH</option>
                        <option value="indosat">INDOSAT</option>
                        <option value="telkomsel">TELKOMSEL</option>
                    </select>
                </div>
                
                <div class="col-12 mt-2" id="sniperBox" style="display:none;">
                    <select id="targetPrice" class="form-select">
                        <option value="max-600">🎯 SNIPER: Asal di bawah Rp 600</option>
                        <option value="max-800">🎯 SNIPER: Asal di bawah Rp 800</option>
                        <option value="438">Bidik Harga Kaku: Rp 438</option>
                        <option value="">-- Tanpa Bidik (Otomatis Termurah) --</option>
                    </select>
                </div>
            </div>

            <button class="btn-order" onclick="orderNumber(false)" id="btnOrder">AMBIL NOMOR SHOPEE</button>
            <button class="btn-order btn-auto" onclick="toggleAutoSniper()" id="btnAuto">🤖 MULAI AUTO SNIPER</button>

            <div class="mt-4">
                <div class="data-row"><span class="text-secondary">Order ID</span><span id="display-id" style="font-weight: 700;">-</span></div>
                <div class="data-row"><span class="text-secondary">Nomor HP</span><b id="display-number" style="color: var(--accent-primary); font-size: 1rem;">Ready...</b></div>
            </div>

            <div class="otp-display">
                <div id="otp-box">WAITING</div>
                <div class="status-text text-secondary mt-2" style="font-size: 0.8rem; font-weight: 600;" id="status-desc">Menunggu Perintah...</div>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <button class="btn-util w-50 me-2 btn-success-custom" onclick="copyNumber(this)">COPY NOMOR</button>
                <button class="btn-util w-50 ms-2" onclick="clearData(this)">CLEAR DATA</button>
            </div>
        </div>

        <div class="main-card">
            <div class="section-title">🏠 NAMA DAN ALAMAT (JAWA)</div>
            <div class="data-box">
                <div class="mb-1">Nama: <b id="util-nama">-</b></div>
                <div class="mb-1">Alamat: <b id="util-alamat">-</b></div>
                <div>Detail: <b id="util-detail">-</b></div>
            </div>
            <div class="d-flex justify-content-between">
                <button class="btn-util w-50 me-2" onclick="generateRandomData(this)">GENERATE BARU</button>
                <button class="btn-util w-50 ms-2 btn-success-custom" onclick="copyAlamatData(this)">COPY DATA</button>
            </div>
        </div>
        
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const API_BASE = "https://aihomestore.alazam04.workers.dev/api";
        let checkTimer = null;
        let autoSniperActive = false;
        let sniperTimeout = null;

        function buttonFeedback(btnElement, tempText) {
            if (!btnElement) return;
            const originalText = btnElement.innerText;
            btnElement.innerText = tempText;
            btnElement.style.opacity = "0.8";
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.style.opacity = "1";
            }, 1500);
        }

        function toggleSmsTarget() {
            const srv = document.getElementById('serverSelect').value;
            document.getElementById('sniperBox').style.display = (srv === 'smscode') ? 'block' : 'none';
            checkBalance();
        }

        async function checkBalance() {
            const server = document.getElementById('serverSelect').value;
            const balanceEl = document.getElementById('display-balance');
            balanceEl.innerText = "...";
            try {
                const res = await fetch(`${API_BASE}/balance?server=${server}`);
                const data = await res.json();
                if(data.balance) {
                    balanceEl.innerText = data.balance;
                } else {
                    balanceEl.innerText = "Error";
                }
            } catch (e) {
                balanceEl.innerText = "Off";
            }
        }

        window.onload = () => {
            if(localStorage.getItem('order_id')) {
                document.getElementById('display-id').innerText = localStorage.getItem('order_id');
                document.getElementById('display-number').innerText = localStorage.getItem('phone');
                startPolling();
            }
            if(localStorage.getItem('pref_server')) {
                document.getElementById('serverSelect').value = localStorage.getItem('pref_server');
                toggleSmsTarget();
            } else {
                checkBalance();
            }
            if(localStorage.getItem('pref_op')) document.getElementById('operatorSelect').value = localStorage.getItem('pref_op');
        };

        function toggleAutoSniper() {
            const btnAuto = document.getElementById('btnAuto');
            const btnOrder = document.getElementById('btnOrder');
            autoSniperActive = !autoSniperActive;
            
            if(autoSniperActive) {
                btnAuto.innerText = "🛑 HENTIKAN AUTO SNIPER";
                btnAuto.style.backgroundColor = "var(--accent-danger)";
                btnOrder.disabled = true;
                orderNumber(true); 
            } else {
                btnAuto.innerText = "🤖 MULAI AUTO SNIPER";
                btnAuto.style.backgroundColor = "var(--accent-purple)";
                btnOrder.disabled = false;
                clearTimeout(sniperTimeout);
                document.getElementById('status-desc').innerText = "Auto Sniper Dihentikan.";
            }
        }

        async function orderNumber(isAuto = false) {
            const server = document.getElementById('serverSelect').value;
            const operator = document.getElementById('operatorSelect').value;
            const targetPrice = document.getElementById('targetPrice') ? document.getElementById('targetPrice').value : "";
            const btnOrder = document.getElementById('btnOrder');

            localStorage.setItem('pref_server', server);
            localStorage.setItem('pref_op', operator);

            if(!isAuto) { btnOrder.disabled = true; btnOrder.innerText = "MEMBIDIK TARGET..."; }
            document.getElementById('display-number').innerText = "Ordering...";
            document.getElementById('display-number').style.color = "var(--accent-primary)";
            document.getElementById('status-desc').innerText = isAuto ? "Auto Sniper sedang memantau stok..." : "Menunggu respons server...";
            document.getElementById('status-desc').style.color = "var(--text-muted)";

            let orderSukses = false;

            try {
                const res = await fetch(`${API_BASE}/order?server=${server}&operator=${operator}&targetprice=${targetPrice}`);
                const data = await res.json();

                if (data.id && data.number) {
                    orderSukses = true;
                    localStorage.setItem('order_id', data.id); localStorage.setItem('phone', data.number);
                    document.getElementById('display-id').innerText = data.id; 
                    document.getElementById('display-number').innerText = data.number;
                    document.getElementById('display-number').style.color = "var(--accent-primary)";
                    document.getElementById('otp-box').innerText = "WAITING"; 
                    document.getElementById('otp-box').style.color = "#0d9488";
                    document.getElementById('status-desc').innerText = "DAPAT NOMOR! Menunggu SMS Masuk...";
                    document.getElementById('notif-sound').play(); 
                    
                    if(autoSniperActive) toggleAutoSniper();
                    
                    startPolling();
                    checkBalance();
                } else {
                    let pesanError = data.error || JSON.stringify(data);
                    document.getElementById('display-number').innerText = "STOK KOSONG";
                    document.getElementById('display-number').style.color = "var(--accent-danger)";
                    document.getElementById('status-desc').innerText = "Error: " + pesanError;
                    document.getElementById('status-desc').style.color = "var(--accent-danger)";
                }
            } catch (e) { 
                document.getElementById('display-number').innerText = "Error Worker";
                document.getElementById('display-number').style.color = "var(--accent-danger)";
                document.getElementById('status-desc').innerText = "Gagal terhubung ke Cloudflare Worker";
                document.getElementById('status-desc').style.color = "var(--accent-danger)";
            } finally {
                if(!isAuto) { btnOrder.disabled = false; btnOrder.innerText = "AMBIL NOMOR SHOPEE"; }
                if (autoSniperActive && !orderSukses) {
                    document.getElementById('status-desc').innerText += "\n(Mencoba lagi dalam 3 detik...)";
                    sniperTimeout = setTimeout(() => { orderNumber(true); }, 3000);
                }
            }
        }

        function startPolling() { if(checkTimer) clearInterval(checkTimer); checkTimer = setInterval(checkOTP, 5000); }

        async function checkOTP() {
            const id = localStorage.getItem('order_id'); const server = localStorage.getItem('pref_server');
            if(!id) return;
            try {
                const res = await fetch(`${API_BASE}/check?id=${id}&server=${server}`);
                const data = await res.json();
                if (data.otp && data.otp !== "-") {
                    document.getElementById('otp-box').innerText = data.otp;
                    if (data.otp.startsWith("ERR:") || data.otp.startsWith("STAT:")) { 
                        document.getElementById('otp-box').style.color = "var(--accent-danger)"; 
                    } 
                    else {
                        document.getElementById('otp-box').style.color = "var(--accent-success)"; 
                        document.getElementById('status-desc').innerText = "OTP MASUK!";
                        document.getElementById('notif-sound').play(); 
                        clearInterval(checkTimer);
                    }
                }
            } catch (e) {}
        }

        function clearData(btn) { 
            buttonFeedback(btn, "MENGHAPUS...");
            localStorage.clear(); 
            setTimeout(() => { location.reload(); }, 500); 
        }
        
        function copyNumber(btn) { 
            const num = document.getElementById('display-number').innerText; 
            if(num && num !== "Ready..." && num !== "STOK KOSONG" && num !== "Error Worker") { 
                navigator.clipboard.writeText(num); 
                buttonFeedback(btn, "TERSALIN!");
            } 
        }

        function copyAlamatData(btn) {
