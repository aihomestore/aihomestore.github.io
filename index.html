<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --primary: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
    --shopee: linear-gradient(135deg, #ee4d2d 0%, #ff7337 100%);
    --accent: #fbbf24;
    --text: #f8fafc;
}

body { margin:0; font-family:'Poppins',sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
.container { padding: 30px 15px; max-width: 500px; margin: auto; }

.card { background: var(--card); margin-bottom: 20px; padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.title { font-size: 13px; font-weight: 700; margin-bottom: 15px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; border-left: 4px solid #3b82f6; padding-left: 10px; }

.btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }
.btn-shopee { background: var(--shopee); box-shadow: 0 4px 10px rgba(238, 77, 45, 0.3); }
.btn:active { transform: scale(0.96); opacity: 0.9; }

.result-box { margin-top: 15px; background: rgba(15, 23, 42, 0.5); padding: 12px; border-radius: 10px; text-align: center; color: #22c55e; font-weight: 600; border: 1px solid rgba(34, 197, 94, 0.2); }

.select-op { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 12px; outline: none; font-size: 14px; }

.otp-container { background: #0f172a; border-radius: 15px; padding: 20px; margin-top: 20px; text-align: center; border: 2px dashed #334155; position: relative; }
.otp-box { font-size: 32px; font-weight: 800; color: var(--accent); letter-spacing: 2px; }
.status-text { font-size: 11px; color: #60a5fa; margin-top: 10px; font-style: italic; }

.info-grid { margin-top: 15px; display: grid; gap: 8px; }
.info-item { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.info-label { color: #94a3b8; }
.info-val { font-weight: 600; color: #f1f5f9; }

.link-list { display: flex; flex-direction: column; gap: 10px; }
.link-group { background: #0f172a; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; border: 1px solid transparent; transition: 0.3s; }
.link-group:hover { border-color: #3b82f6; background: #1e293b; }
.link-label { color: white; font-weight: 600; font-size: 13px; cursor: pointer; }
.link-actions { display: flex; gap: 8px; }
.icon-btn { background: #334155; border: none; color: white; padding: 6px 10px; border-radius: 6px; font-size: 10px; cursor: pointer; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
</style>
</head>
<body>

<div class="container">

    <div class="card">
        <div class="title">🎲 Generator Nama</div>
        <button class="btn" onclick="genNama()">GENERATE & AUTO COPY</button>
        <div class="result-box" id="nama">Menunggu...</div>
    </div>

    <div class="card">
        <div class="title">🛍️ Shopee OTP Engine</div>
        <select class="select-op" id="operator">
            <option value="any">Otomatis (Termurah)</option>
            <option value="telkomsel">Telkomsel</option>
            <option value="indosat">Indosat</option>
            <option value="xl">XL Axiata</option>
            <option value="three">Tri (3)</option>
            <option value="axis">Axis</option>
        </select>
        <button class="btn btn-shopee" onclick="pesanNomor()">AMBIL NOMOR SHOPEE</button>

        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">Order ID</span>
                <span class="info-val" id="id">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Nomor HP</span>
                <span class="info-val" id="nomor">-</span>
            </div>
        </div>

        <div class="otp-container">
            <div class="otp-box" id="otp">WAITING</div>
            <div id="status" class="status-text">Ready to order...</div>
        </div>
        <button id="btnCopyNomor" class="btn" style="display:none; margin-top:10px; background:#334155;" onclick="copyTeks('nomor')">COPY NOMOR</button>
    </div>

    <div class="card">
        <div class="title">🔗 Link Order</div>
        <div class="link-list">
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/6VKFY7rZoL')">AWAW 1 ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/6VKFY7rZoL')">COPY</button>
            </div>
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/6px5wm8CN6')">AWAW 2 ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/6px5wm8CN6')">COPY</button>
            </div>
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/901aWmbQPp')">AWAW 3 ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/901aWmbQPp')">COPY</button>
            </div>
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/9fHHK4KU73')">WHITE CYBER ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/9fHHK4KU73')">COPY</button>
            </div>
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/4qC1ZEp4uu')">ALFA DIGITAL ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/4qC1ZEp4uu')">COPY</button>
            </div>
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/3Vgdyp7e4p')">SRIBUFOLLS ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/3Vgdyp7e4p')">COPY</button>
            </div>
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/AADXv6H81t')">HELENA STUFF ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/AADXv6H81t')">COPY</button>
            </div>
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/4AwKm7hE75')">SECRET PANEL ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/4AwKm7hE75')">COPY</button>
            </div>
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/9KeQve7UK9')">PROMETIXPANEL ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/9KeQve7UK9')">COPY</button>
            </div>
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/8fOk8T99r5')">YOAKE 1 ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/8fOk8T99r5')">COPY</button>
            </div>
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/3LNDmhKKrw')">YOAKE 2 ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/3LNDmhKKrw')">COPY</button>
            </div>
            <div class="link-group">
                <span class="link-label" onclick="window.open('https://s.shopee.co.id/2g7J598NmS')">MAMA WHITE CYBER ↗</span>
                <button class="icon-btn" onclick="copyDirect('https://s.shopee.co.id/2g7J598NmS')">COPY</button>
            </div>
        </div>
    </div>

</div>

<script>
// GEN NAMA
const d = ["Ahmad","Budi","Siti","Rina","Dewi","Aisyah","Rizky","Fajar","Eko","Maya","Andi","Sari","Hadi","Yanto","Lestari","Putra","Putri","Bambang","Agus","Indah","Mega","Surya","Taufik","Nur","Anisa","Dedi","Rita","Yudi","Siska","Zul","Fahmi","Rendra","Intan","Arif","Wawan"];
const b = ["Santoso","Pratama","Wijaya","Saputra","Rahman","Firmansyah","Kusuma","Hidayat","Setiawan","Nugroho","Mulyono","Siregar","Nasution","Purnama","Wulandari","Laksana","Gumilang","Sujatmiko","Gunawan","Subagjo","Zulkarnain","Fauzi","Maulana","Fitrianto","Haryanto","Wibowo","Suherman","Budiman","Junaidi","Tanjung","Hutapea","Simbas","Sholeh"];

function genNama(){
  let n = d[Math.floor(Math.random()*d.length)] + " " + b[Math.floor(Math.random()*b.length)];
  document.getElementById("nama").innerText = n;
  navigator.clipboard.writeText(n);
}

// SMS HERO ENGINE
let orderID = "";
let timer;

function pesanNomor(){
  const op = document.getElementById("operator").value;
  document.getElementById("nomor").innerText = "Ordering...";
  document.getElementById("status").innerText = "Menghubungi Cloudflare...";
  document.getElementById("btnCopyNomor").style.display = "none";
  
  fetch(`https://aihomestore.alazam04.workers.dev/api/order?service=ka&operator=${op}`)
  .then(r => r.json())
  .then(res => {
    if(res.number){
      orderID = res.id;
      document.getElementById("id").innerText = res.id;
      document.getElementById("nomor").innerText = res.number;
      document.getElementById("btnCopyNomor").style.display = "block";
      document.getElementById("status").innerText = "Nomor Aktif! Menunggu SMS...";
      navigator.clipboard.writeText(res.number);
      clearInterval(timer);
      timer = setInterval(cekOTP, 5000);
    } else {
      alert("Gagal: " + (res.error || "Server Sibuk"));
    }
  });
}

function cekOTP(){
  fetch(`https://aihomestore.alazam04.workers.dev/api/check?id=${orderID}`)
  .then(r => r.json())
  .then(res => {
    if(res.otp && res.otp !== "-"){
      document.getElementById("otp").innerText = res.otp;
      document.getElementById("status").innerText = "OTP BERHASIL DITERIMA!";
      navigator.clipboard.writeText(res.otp);
      clearInterval(timer);
    }
  });
}

function copyDirect(t){ navigator.clipboard.writeText(t); alert("Link disalin!"); }
function copyTeks(id) { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("Disalin!"); }
</script>

</body>
</html>
